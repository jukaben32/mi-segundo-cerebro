<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoClaw AI Hub | Misión y Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar: #1e293b;
            --accent: #22d3ee;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--bg-dark));
            color: white;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        aside h1 {
            font-size: 1.5rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent);
        }

        /* Main Content Panel */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-launch {
            background: linear-gradient(135deg, #22d3ee 0%, #0891b2 100%);
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            color: var(--bg-dark);
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            float: right;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.2);
        }

        /* Results Display */
        .result-box {
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            padding: 25px;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
            color: #e2e8f0;
            display: none;
        }

        /* File & History Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card-item {
            background: var(--glass);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .card-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .card-item h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .card-item p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <aside>
        <h1>AutoClaw Hub</h1>
        <div class="nav-item active" onclick="switchTab('launch')">🚀 Lanzar Misión</div>
        <div class="nav-item" onclick="switchTab('files'); loadFiles()">📂 Mis Documentos</div>
        <div class="nav-item" onclick="switchTab('history'); loadHistory()">📜 Historial</div>
    </aside>

    <main>
        <!-- Tab 1: Lanzar Misión -->
        <div id="launch" class="tab-content active">
            <div class="main-card">
                <h2 style="margin-top:0">Consola de Mando</h2>
                <textarea id="promptInput" rows="4" placeholder="Describe tu misión..."></textarea>
                <button class="btn-launch" onclick="launchMission()">🚀 Ejecutar</button>
                <div style="clear: both;"></div>
            </div>

            <div id="loading" class="loading-spinner">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: var(--accent);">AutoClaw está en proceso...</p>
            </div>

            <div id="resultBox" class="result-box"></div>
        </div>

        <!-- Tab 2: Mis Documentos -->
        <div id="files" class="tab-content">
            <h2>Documentos Generados Localmente</h2>
            <div id="filesGrid" class="grid-container">
                <!-- Se llenará dinámicamente -->
            </div>
        </div>

        <!-- Tab 3: Historial -->
        <div id="history" class="tab-content">
            <h2>Registro de Misiones Recientes</h2>
            <div id="historyGrid" class="grid-container">
                <!-- Se llenará dinámicamente -->
            </div>
        </div>
    </main>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function launchMission() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const data = await res.json();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resultBox').innerText = data.output;
        }

        async function loadFiles() {
            const res = await fetch('/api/files');
            const files = await res.json();
            const grid = document.getElementById('filesGrid');
            grid.innerHTML = files.map(f => `
                <div class="card-item">
                    <h3>${f.name}</h3>
                    <p>Modificado: ${f.date}</p>
                    <p style="color:var(--accent); cursor:pointer;">📂 Ver archivo</p>
                </div>
            `).join('');
        }

        async function loadHistory() {
            const res = await fetch('/api/history');
            const history = await res.json();
            const grid = document.getElementById('historyGrid');
            grid.innerHTML = history.map(h => `
                <div class="card-item">
                    <h3>${h.prompt}</h3>
                    <p>${h.date}</p>
                    <div style="font-size:0.8rem; color:#64748b; margin-top:10px;">${h.output}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
